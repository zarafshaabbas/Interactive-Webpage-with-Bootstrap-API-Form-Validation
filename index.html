<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome To My Interactive Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="text-center mb-4">Welcome To My Interactive Webpage!</h1>

    <p class="text-center">This paragraph uses bootstrap styling.</p>

    <p class="text-center">Click below to visit my profile:</p>

    <div class="text-center mb-4">
        <a 
            href="https://www.linkedin.com/in/zarafsha-abbas531313322?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app"
            class="btn btn-success"
            target="_blank"
        >
            Visit My Profile
        </a>
    </div>

    <div class="text-center mb-5">
        <button onclick="changeBackground()" class="btn btn-primary">
            Change Background Color
        </button>
    </div>

    <h2 class="text-center mb-3">My GitHub Snapshot</h2>

    <div id="api-content" class="text-center mb-5 text-muted">
        Loading professional info...
    </div>

    <h2 class="text-center mb-4">Contact Me</h2>

    <form id="contactForm" class="mx-auto" style="max-width: 600px;" novalidate>

        <div class="mb-3">
            <label for="name" class="form-label">Name *</label>
            <input type="text" class="form-control" id="name" required>
            <small class="text-danger" id="nameError"></small>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email *</label>
            <input type="email" class="form-control" id="email" required>
            <small class="text-danger" id="emailError"></small>
        </div>

        <div class="mb-3">
            <label for="message" class="form-label">Message *</label>
            <textarea class="form-control" id="message" rows="5" required></textarea>
            <small class="text-danger" id="messageError"></small>
        </div>

        <button type="submit" class="btn btn-success">Send</button>

    </form>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
<script src="script.js"></script>

</body>
</html>
